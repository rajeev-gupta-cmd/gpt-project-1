name: CICD Pipeline

on:
  push:
    branches: 
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: build image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/app .

      - name: push image
        run: docker push ${{secrets.DOCKER_USERNAME}}/app 
      
      - name: ssh setup
        run: |
          echo "${{secrets.EC2_key}}" > key.pem
          chmod 600 key.pem
       
      - name: deploy      
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{secrets.ec2url}} << EOF
            docker pull rajeevguptaaa/app
            docker stop app-cont || true
            docker rm app-cont || true
            docker run -d -p 5000:5000 --name app-cont rajeevguptaaa/app:latest
            EOF   
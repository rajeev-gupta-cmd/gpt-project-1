name: CICD Pipeline

on:
  push:
    branches: 
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: build image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/app:${{github.sha}} .

      - name: push image
        run: docker push ${{secrets.DOCKER_USERNAME}}/app:${{github.sha}}
      
      - name: ssh setup
        run: |
          echo "${{secrets.EC2_key}}" > key.pem
          chmod 600 key.pem
           
      - name: deploy      
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{secrets.EC2_USER}}@${{secrets.EC2_HOST}} << EOF
          docker pull ${{secrets.DOCKER_USERNAME}}/app:${{ github.sha}}
          docker run -d -p 5001:5001 --name new-cont ${{secrets.DOCKER_USERNAME}}/app:${{github.sha}}
          sleep 8s
          curl -f http://localhost:5001/ || exit 1
          docker stop app-cont || true
          docker rm app-cont || true
          docker rename new-cont app-cont
          EOF
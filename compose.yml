services:
  app:
    image: app:latest
    container_name: app_cont
    ports:
      - "5000:5000"
    env_file:
      - environment.txt
    restart: always
    depends_on:
      - mysql
  mysql:
    image: mysql
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./default.conf:etc/nginx/conf.d/default.conf
    depends_on:
      - app_cont